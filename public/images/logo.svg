<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C9A7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0066FF" flood-opacity="0.25"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="0.8" fill="#00C9A7" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="516" height="156" rx="22" ry="22" fill="#060E1F"/>
  <rect x="2" y="2" width="516" height="156" rx="22" ry="22" fill="url(#dots)"/>

  <!-- Icon group -->
  <g transform="translate(32, 28)" filter="url(#shadow)">
    <polygon points="52,4 92,26 92,70 52,92 12,70 12,26"
      fill="none" stroke="url(#brandGrad)" stroke-width="2.5" opacity="0.5"/>
    <polygon points="52,14 82,30 82,66 52,82 22,66 22,30"
      fill="url(#brandGrad)" opacity="0.15"/>

    <!-- Car silhouette -->
    <g transform="translate(18, 36)" filter="url(#glow)">
      <rect x="4" y="18" width="58" height="18" rx="4" fill="url(#brandGrad)"/>
      <path d="M14 18 Q18 6 30 4 L42 4 Q52 6 52 18Z" fill="url(#brandGrad)"/>
      <path d="M18 18 Q21 10 30 8 L38 8 Q46 10 48 18Z" fill="#060E1F" opacity="0.6"/>
      <circle cx="16" cy="36" r="7" fill="#060E1F"/>
      <circle cx="16" cy="36" r="4.5" fill="url(#brandGrad)"/>
      <circle cx="50" cy="36" r="7" fill="#060E1F"/>
      <circle cx="50" cy="36" r="4.5" fill="url(#brandGrad)"/>
      <ellipse cx="62" cy="24" rx="3" ry="2" fill="#00C9A7" opacity="0.9"/>
    </g>

    <!-- AI signal arcs -->
    <g transform="translate(74, 14)" opacity="0.85">
      <path d="M0 16 Q8 8 16 0" stroke="#00C9A7" stroke-width="2"
        fill="none" stroke-linecap="round"/>
      <path d="M0 22 Q12 10 24 0" stroke="#00C9A7" stroke-width="1.5"
        fill="none" stroke-linecap="round" opacity="0.6"/>
    </g>

    <!-- Location pin -->
    <g transform="translate(6, 6)">
      <circle cx="8" cy="8" r="5" fill="none" stroke="#0066FF" stroke-width="2"/>
      <circle cx="8" cy="8" r="2" fill="#0066FF"/>
      <line x1="8" y1="13" x2="8" y2="19" stroke="#0066FF"
        stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Circuit nodes -->
    <line x1="20" y1="15" x2="38" y2="10" stroke="url(#brandGrad)"
      stroke-width="1" opacity="0.4" stroke-dasharray="2 3"/>
    <circle cx="20" cy="15" r="2" fill="#00C9A7" opacity="0.6"/>
    <circle cx="38" cy="10" r="2" fill="#0066FF" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="148" y="88"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52" font-weight="700" letter-spacing="-1"
    fill="#66ff00">Ride</text>
  <text x="258" y="88"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52" font-weight="700" letter-spacing="-1"
    fill="url(#brandGrad)">Connect</text>

  <!-- Tagline -->
  <text x="149" y="112"
    font-family="'Courier New', monospace"
    font-size="12" letter-spacing="3.5"
    fill="#fdee00" opacity="0.75">AI-POWERED SMART TRANSPORT</text>

  <!-- Accent line -->
  <line x1="148" y1="96" x2="494" y2="96"
    stroke="url(#brandGrad)" stroke-width="1.5" opacity="0.3"/>
</svg>