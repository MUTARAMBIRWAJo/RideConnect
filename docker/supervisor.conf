[supervisord]
nodaemon=true

[program:laravel-web]
command=/bin/sh /var/www/scripts/render-port-check.sh
autostart=true
autorestart=true
stdout_logfile=/var/www/storage/logs/web.log
stderr_logfile=/var/www/storage/logs/web-error.log

[program:php-fpm]
command=php-fpm
autostart=true
autorestart=true

[program:laravel-worker]
command=php /var/www/artisan queue:work --sleep=3 --tries=3 --timeout=90
autostart=true
autorestart=true
stdout_logfile=/var/www/storage/logs/worker.log

[program:laravel-scheduler]
command=php /var/www/artisan schedule:work
autostart=true
autorestart=true
stdout_logfile=/var/www/storage/logs/scheduler.log